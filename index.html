<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Need Financial Assistance?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 520px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            padding: 40px 28px 32px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
            text-align: center;
            border: 1px solid #f0f2f5;
        }
        .update-badge {
            display: inline-block;
            background: #e6f7e6;
            color: #0b7e3d;
            font-size: 14px;
            font-weight: 700;
            padding: 6px 20px;
            border-radius: 40px;
            letter-spacing: 0.3px;
            margin-bottom: 20px;
            border: 1px solid #b8e0b8;
        }
        .update-badge::before {
            content: "📅 ";
        }
        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #0a0a0a;
            line-height: 1.2;
            margin-bottom: 12px;
        }
        .description {
            font-size: 18px;
            color: #1e293b;
            line-height: 1.6;
            margin-bottom: 28px;
            font-weight: 400;
            padding: 0 4px;
        }
        .cta-btn {
            display: block;
            width: 100%;
            background: #0b7e3d;
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            padding: 18px 20px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s ease;
            margin: 6px 0 18px;
            box-shadow: 0 6px 18px rgba(11, 126, 61, 0.30);
        }
        .cta-btn:hover {
            background: #096b32;
        }
        .cta-btn:active {
            transform: scale(0.97);
        }
        .trust-row {
            display: flex;
            justify-content: center;
            gap: 22px;
            font-size: 14px;
            color: #64748b;
            margin: 10px 0 16px;
            flex-wrap: wrap;
        }
        .trust-row span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .disclaimer {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.6;
            background: #f8fafc;
            padding: 14px 16px;
            border-radius: 14px;
            margin: 14px 0 8px;
            border: 1px solid #eef2f6;
        }
        .disclaimer a {
            color: #0b7e3d;
            text-decoration: none;
            font-weight: 500;
        }
        .disclaimer a:hover {
            text-decoration: underline;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 18px;
            font-size: 12px;
            color: #94a3b8;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .footer-links a {
            color: #94a3b8;
            text-decoration: none;
        }
        .footer-links a:hover {
            color: #0b7e3d;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="update-badge">Grants Updated June 30th, 2026</div>
    <h1>Need Financial Assistance?</h1>
    <p class="description">
        Explore your options to get Grants, Financial Aid, and access to many other free programs designed to help fund your education.
    </p>
    <a href="#" id="ctaButton" class="cta-btn">→ Check Your Eligibility Now</a>
    <div class="trust-row">
        <span>🔒 Secure &amp; private</span>
        <span>⚡ Free to check</span>
        <span>🏛️ Verified programs</span>
    </div>
    
        
        
        <a href="#" onclick="alert('Privacy Policy: Your data is secure.'); return false;">Privacy</a>
        
        
    
  
        
    


<script>
    (function() {
        // ----- CONFIGURATION (EDIT THIS) -----
        const TRACKING_LINK = "https://trk.ussay.space/click";
        const DEFAULT_FIRST_NAME = "John";
        const DEFAULT_LAST_NAME = "Doe";
        const DEFAULT_EMAIL = "john.doe@example.com";
        // --------------------------------------

        function getParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name) || '';
        }

        function buildPrepopString(first, last, email) {
            const raw = `firstName=${first}&lastName=${last}&email=${email}`;
            return encodeURIComponent(raw);
        }

        const firstName = getParam('firstName') || DEFAULT_FIRST_NAME;
        const lastName = getParam('lastName') || DEFAULT_LAST_NAME;
        const email = getParam('email') || DEFAULT_EMAIL;

        function getOfferUrl() {
            // FIXED: Now checks against the original placeholder
            if (!TRACKING_LINK || TRACKING_LINK === "https://trk.ussay.space/click") {
                alert("⚠️ Please set your tracking link in the HTML.");
                return '#';
            }
            const prepopEncoded = buildPrepopString(firstName, lastName, email);
            const separator = TRACKING_LINK.includes('?') ? '&' : '?';
            return `${TRACKING_LINK}${separator}x=${prepopEncoded}`;
        }

        const cta = document.getElementById('ctaButton');
        cta.addEventListener('click', function(e) {
            e.preventDefault();
            const url = getOfferUrl();
            if (url !== '#') {
                cta.textContent = 'Redirecting...';
                cta.style.opacity = '0.7';
                cta.style.pointerEvents = 'none';
                setTimeout(function() {
                    window.location.href = url;
                }, 300);
            }
        });

        console.log('Final URL:', getOfferUrl());
    })();
</script>

</body>
</html>
